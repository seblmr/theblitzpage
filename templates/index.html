<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BlitzPage – Instant Landing Page Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ✅ Toast notification (remplace alert) */
    #toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(4rem);
      background: #10b981; color: #000; font-weight: 700; font-size: 1rem;
      padding: 1rem 2rem; border-radius: 9999px;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0; z-index: 1000; white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function generateIdea() {
      const btn = document.getElementById('gen-btn');
      btn.disabled = true;
      btn.textContent = '⏳ Generating…';
      try {
        const res = await fetch('/generate-idea', { method: 'POST' });
        if (!res.ok) throw new Error();
        const idea = await res.json();
        document.querySelector('input[name="product_name"]').value = idea.product_name;
        document.querySelector('input[name="tagline"]').value      = idea.tagline;
        document.querySelector('textarea[name="description"]').value = idea.description;
        document.querySelector('input[name="features"]').value     = idea.features;
        showToast('✅ Idea loaded — fill your email & generate!');
      } catch {
        showToast('⚠️ Error generating idea, try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate a Winning Idea 🔥';
      }
    }
  </script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center py-12">

  <!-- Toast -->
  <div id="toast"></div>

  <div class="max-w-2xl mx-auto px-6 w-full">
    <div class="text-center mb-8">
      <h1 class="text-5xl font-black mb-2">🚀 BLITZPAGE</h1>
      <p class="text-xl text-violet-400">Create a pro landing page in 30 seconds • First $ in 24h</p>
    </div>

    <!-- IDEA GENERATOR -->
    <div class="bg-emerald-900/30 border border-emerald-400 rounded-3xl p-8 mb-10 text-center">
      <h2 class="text-3xl font-bold mb-4">Stuck for an idea?</h2>
      <p class="text-emerald-300 mb-6">Get a clear, specific, phone-only side-hustle idea ready to launch today</p>
      <button id="gen-btn" onclick="generateIdea()"
              class="bg-emerald-500 hover:bg-emerald-600 disabled:opacity-50 text-black font-bold text-2xl py-6 px-12 rounded-3xl transition">
        Generate a Winning Idea 🔥
      </button>
      <!-- ✅ FIX: comptage correct -->
      <p class="text-xs text-emerald-400 mt-6">{{ ideas_count }} hot 2026 ideas • Start now • 100% executable from phone</p>
    </div>

    <form method="POST" class="space-y-6 bg-zinc-900 p-8 rounded-3xl">
      <!-- ✅ Token CSRF -->
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div>
        <label class="block text-sm mb-2 font-medium">Your Email <span class="text-zinc-500">(to save your landings)</span></label>
        <input type="email" name="email" required
               class="w-full bg-zinc-800 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-violet-500"
               placeholder="you@email.com">
      </div>
      <div>
        <label class="block text-sm mb-2 font-medium">Product Name</label>
        <input type="text" name="product_name" required
               class="w-full bg-zinc-800 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-violet-500"
               placeholder="SideHustle Scout Bot">
      </div>
      <div>
        <label class="block text-sm mb-2 font-medium">Tagline</label>
        <input type="text" name="tagline"
               class="w-full bg-zinc-800 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-violet-500"
               placeholder="Finds profitable phone-only ideas daily">
      </div>
      <div>
        <label class="block text-sm mb-2 font-medium">Description</label>
        <textarea name="description" rows="4"
                  class="w-full bg-zinc-800 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-violet-500"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-sm mb-2 font-medium">Price ($ one-time)</label>
          <!-- ✅ FIX: type="number" + min pour bloquer les valeurs invalides côté client -->
          <input type="number" name="price" value="16" min="0.50" step="0.01" required
                 class="w-full bg-zinc-800 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-violet-500">
        </div>
        <div>
          <label class="block text-sm mb-2 font-medium">Features <span class="text-zinc-500 text-xs">(virgule séparées)</span></label>
          <input type="text" name="features" value="Daily alerts,Copy-paste templates,24h launch plan"
                 class="w-full bg-zinc-800 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-violet-500">
        </div>
      </div>
      <button type="submit"
              class="w-full bg-violet-600 hover:bg-violet-700 py-6 rounded-3xl text-2xl font-bold transition">
        GENERATE MY LANDING PAGE 🔥
      </button>
    </form>
  </div>
</body>
</html>
